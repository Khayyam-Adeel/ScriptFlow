<div class="auth-card">
  <h1>ScriptFlow</h1>
  <p class="subtitle">Create an account to start prescribing.</p>

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <app-text-field
      label="Email"
      type="email"
      [control]="emailControl"
      placeholder="you@practice.co.nz"
      errorMessage="Enter a valid email address."
      [fullWidth]="true"
    />
    <app-text-field
      label="Password"
      type="password"
      [control]="passwordControl"
      placeholder="At least 8 characters"
      errorMessage="Password must be at least 8 characters."
      [fullWidth]="true"
    />

    <div class="form-actions">
      <app-button type="submit" [loading]="submitting()">Create account</app-button>
    </div>
  </form>

  <p class="switch">Already have an account? <a routerLink="/login">Sign in</a></p>
</div>
