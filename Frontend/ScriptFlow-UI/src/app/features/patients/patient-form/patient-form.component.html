<a class="back-link" routerLink="/patients">
  <app-icon name="arrow-left" [size]="14" />
  All patients
</a>

<div class="page-header">
  <div>
    <h1>New patient</h1>
    <p class="page-subtitle">Register a patient so prescriptions can be issued for them.</p>
  </div>
</div>

<div class="form-card">
  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <app-text-field label="First name" [control]="firstNameControl" />
    <app-text-field label="Last name" [control]="lastNameControl" />
    <app-text-field label="Address" [control]="addressControl" [fullWidth]="true" />
    <app-text-field
      label="NHI"
      [control]="nhiControl"
      placeholder="ABC1234"
      errorMessage="NHI must be 3 letters followed by 4 digits, e.g. ABC1234."
    />
    <app-text-field label="Date of birth" type="date" [control]="dateOfBirthControl" />
    <app-select-field label="Gender" [control]="genderControl" [options]="genderOptions" />
    <app-text-field
      label="Phone number"
      [control]="phoneNumberControl"
      placeholder="021 234 5678"
      errorMessage="Phone number must be 7-20 characters and may only contain digits, spaces, and + - ( )."
    />
    <app-text-field label="Email" type="email" [control]="emailControl" placeholder="jane.doe@example.com" />

    <div class="form-actions">
      <app-button type="submit" [loading]="submitting()">
        <app-icon name="check" [size]="16" />
        Save patient
      </app-button>
    </div>
  </form>
</div>
