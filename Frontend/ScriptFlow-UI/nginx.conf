server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular router uses client-side routes; fall back to index.html
    # for any path nginx can't find as a static file.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # environment.ts (prod) points apiBaseUrl at the relative "/api" path;
    # proxy it to scriptflow-api over the compose network so the browser
    # never needs to know the backend's host/port.
    location /api/ {
        proxy_pass http://scriptflow-api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR hub - needs the Upgrade headers for websocket, and no
    # buffering so the connection can stay open.
    location /hubs/prescriptions {
        proxy_pass http://notification-service:8080/hubs/prescriptions;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
