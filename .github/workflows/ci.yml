name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    # Real SQL Server + RabbitMQ, not fakes - PrimaryWorkflowIntegrationTests exercises the
    # actual ASP.NET Core pipeline against them (see ScriptFlowApiFactory) and otherwise skips
    # itself when it can't reach infrastructure, which is exactly what happened on every CI run
    # before these two service containers existed.
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "CI_Only_Password123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $MSSQL_SA_PASSWORD -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Install sqlcmd
        run: |
          curl -sSL -O https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> "$GITHUB_PATH"

      - name: Bootstrap database
        env:
          SQLSERVER_HOST: localhost
          MSSQL_SA_PASSWORD: "CI_Only_Password123!"
        run: bash Backend/ScriptFlow.API/Infrastructure/Database/docker-init.sh

      - name: Restore
        run: dotnet restore ScriptFlow.sln

      - name: Build
        run: dotnet build ScriptFlow.sln --configuration Release --no-restore

      - name: Test
        env:
          ConnectionStrings__ScriptFlowDb: "Server=localhost,1433;Database=ScriptFlow;User Id=sa;Password=CI_Only_Password123!;TrustServerCertificate=True"
        run: >
          dotnet test ScriptFlow.sln --configuration Release --no-build
          --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: TestResults/

  frontend:
    name: Frontend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/ScriptFlow-UI
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/ScriptFlow-UI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npx ng test --watch=false --browsers=ChromeHeadless
